<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Diary</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe4ee 0%, #f8c9d8 45%, #f4b0c6 100%);
            min-height: 100vh;
            padding: 24px;
            color: #7a3553;
        }

        .page-shell {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 18px 42px rgba(138, 47, 87, 0.2);
            backdrop-filter: blur(8px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #8a2f57;
            text-decoration: none;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7aa2, #f04b7d);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            box-shadow: 0 6px 16px rgba(240, 75, 125, 0.25);
        }

        .nav-links {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-left: 18px;
        }

        .nav-links a {
            color: #8a2f57;
            text-decoration: none;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .nav-links a:hover {
            background: rgba(240, 75, 125, 0.06);
            color: #f04b7d;
        }

        .nav-links a.active {
            background: rgba(240, 75, 125, 0.1);
            color: #f04b7d;
        }

        .panel {
            background: #fffafc;
            border: 1px solid #f2d0de;
            border-radius: 18px;
            padding: 20px;
        }

        .grid {
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr;
        }

        .dashboard {
            max-width: 1000px;
            margin: 0 auto 18px;
            background: linear-gradient(135deg, #fffafc, #ffeef4);
            border-bottom: 1px solid #f3d4e0;
            padding: 14px 32px;
            box-shadow: 0 6px 18px rgba(138, 47, 87, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 24px;
        }

        .dashboard .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dashboard .right a {
            display: inline-block;
            background: linear-gradient(135deg, #ff7aa2, #f04b7d);
            color: #fff;
            padding: 8px 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(240, 75, 125, 0.15);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        .dashboard .right a:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(240, 75, 125, 0.18);
            opacity: 0.98;
        }

        .panel h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #8a2f57;
        }

        form {
            margin: 0;
        }

        .field {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #8a2f57;
        }

        input,
        textarea {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #f1c7d5;
            border-radius: 10px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background: #fff;
            font-family: inherit;
        }

        input:focus,
        textarea:focus {
            border-color: #f04b7d;
            box-shadow: 0 0 8px rgba(240, 75, 125, 0.25);
            outline: none;
        }

        textarea {
            min-height: 360px;
            resize: vertical;
        }

        .actions-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            padding: 10px 16px;
            background: linear-gradient(135deg, #ff7aa2, #f04b7d);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 18px rgba(240, 75, 125, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(240, 75, 125, 0.35);
        }

        .alert {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #fff1f5;
            color: #a73a62;
            border: 1px solid #f4c9d9;
        }

        .arrow-link {
            position: fixed;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: auto;
            min-width: 120px;
            height: 56px;
            border-radius: 32px;
            background: linear-gradient(135deg, #ffd6e7, #ffb0cc);
            color: #9e214e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 14px;
            text-decoration: none;
            box-shadow: 0 18px 32px rgba(238, 112, 160, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.65);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            z-index: 10;
        }

        .arrow-link:hover {
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 22px 38px rgba(238, 112, 160, 0.3);
            background: linear-gradient(135deg, #ffd2de, #ff9ec1);
        }

        .arrow-link span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .arrow-link span:first-child {
            font-size: 1.6rem;
        }

        .arrow-link .arrow-label {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        @media (max-width: 760px) {
            .dashboard {
                flex-direction: column;
                align-items: center;
                gap: 12px;
                padding: 16px;
            }

            .dashboard .left {
                flex-direction: column;
                align-items: center;
                gap: 12px;
                width: 100%;
            }

            .nav-links {
                margin-left: 0;
                width: 100%;
                justify-content: center;
                gap: 8px;
                flex-wrap: wrap;
            }

            .nav-links a {
                padding: 6px 12px;
                font-size: 0.9rem;
                text-align: center;
            }

            .dashboard .right {
                width: 100%;
                display: flex;
                justify-content: center;
            }

            .dashboard .right a {
                width: 100%;
                text-align: center;
            }

            .grid {
                grid-template-columns: 1fr;
            }
            .arrow-link {
                right: 12px;
                width: 52px;
                height: 52px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="left">
            <a href="{% url 'home' %}" class="brand">
                <div class="brand-mark">D</div>
                <span>My Diary</span>
            </a>
            <nav class="nav-links" aria-label="Main navigation">
                <a href="{% url 'home' %}#write" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Write diary</a>
                <a href="{% url 'side_page' %}" class="{% if request.resolver_match.url_name == 'side_page' %}active{% endif %}">View diary</a>
                <a href="{% url 'todo_page' %}" class="{% if request.resolver_match.url_name == 'todo_page' %}active{% endif %}">To-Do List</a>
            </nav>
        </div>
        <div class="right">
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <div class="page-shell">
        <div class="grid">
            <div class="panel" id="write">
                <h2>Write a new page</h2>
                {% if error %}
                    <div class="alert">{{ error }}</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    {% if diary_entry %}
                        <input type="hidden" name="entry_id" value="{{ diary_entry.pk }}">
                    {% endif %}
                    <div class="field">
                        <label for="written_date">Date</label>
                        <input type="date" id="written_date" name="written_date" value="{{ diary_entry.written_date|default:written_date|default:'' }}">
                    </div>
                    <div class="field">
                        <label for="page">Your entry</label>
                        <textarea id="page" name="page" rows="12">{% if diary_entry %}{{ diary_entry.page }}{% endif %}</textarea>
                    </div>
                    <div class="actions-row">
                        <button type="submit" name="action" value="save">Save</button>
                        {% if diary_entry %}
                            <button type="submit" name="action" value="delete">Delete</button>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>

    <a href="{% url 'side_page' %}" class="arrow-link" aria-label="Open new page">
        <span>&#x2192;</span>
        <span class="arrow-label">Open page</span>
    </a>
</body>
</html>
