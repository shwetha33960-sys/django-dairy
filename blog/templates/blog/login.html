<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffd6e7 0%, #f8c8db 35%, #f7a8c2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .brand {
            position: absolute;
            top: 20px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #8a2f57;
            letter-spacing: 0.5px;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7aa2, #f04b7d);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 16px rgba(240, 75, 125, 0.25);
            font-weight: 800;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(138, 47, 87, 0.2);
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.7s ease;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #7a3553;
            font-weight: 700;
        }

        form p {
            margin-bottom: 14px;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #f1c7d5;
            border-radius: 10px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background: #fffafc;
        }

        input:focus {
            border-color: #f04b7d;
            box-shadow: 0 0 8px rgba(240, 75, 125, 0.25);
            outline: none;
        }

        button {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            background: linear-gradient(135deg, #ff7aa2, #f04b7d);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 18px rgba(240, 75, 125, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(240, 75, 125, 0.35);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="brand">
        <div class="brand-mark">D</div>
        <span>Dairy</span>
    </div>

    <div class="login-card">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            {{ form.as_p }}
            <button type="submit">Log In</button>
        </form>
        <p style="margin-top: 16px; font-size: 0.95rem; text-align: center; color: #83425e;">
            Don't have an account? <a href="{% url 'signup' %}" style="color: #e1417c; text-decoration: none; font-weight: 700;">Sign up</a>
        </p>
    </div>
</body>
</html>
